<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PIXEL SURVIVORS</title>
<style>
  html, body {
    margin: 0; padding: 0; background: #0a0612; height: 100%; width: 100%; overflow: hidden;
    font-family: 'Courier New', monospace; color: #e8e8f0;
    user-select: none;
  }
  #wrap {
    position: fixed; inset: 0;
    background: #0e0818;
  }
  /* Game canvas only — must NOT apply globally, or the tiny skin/icon canvases
     in the panel become absolutely-positioned and fill the whole panel. */
  #game {
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    background: #0e0818;
    cursor: crosshair;
    display: block;
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  #hud {
    position: fixed; top: 12px; left: 12px; right: 12px;
    pointer-events: none; font-size: 14px; line-height: 1.5;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    display: flex; justify-content: space-between; align-items: flex-start;
    z-index: 5;
  }
  #hud .left { text-align: left; }
  #hud .right { text-align: right; }
  .bar {
    width: 260px; height: 16px;
    background: #15081e;
    border: 2px solid #000;
    box-shadow: 0 0 0 1px #5a2880, 0 2px 8px rgba(0,0,0,0.6);
    margin: 4px 0; position: relative; overflow: hidden;
  }
  .bar > div {
    height: 100%; transition: width 120ms linear;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.3), inset 0 3px 0 rgba(255,255,255,0.2);
  }
  .bar.hp > div { background: linear-gradient(to bottom, #ff8888, #ff3333 50%, #aa1111); }
  .bar.xp > div { background: linear-gradient(to bottom, #aaeeff, #44aaff 50%, #1a66cc); }
  .bar .label {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 10px; letter-spacing: 1px; color: #fff;
    text-shadow: 1px 1px 0 #000;
  }
  #hud .stat {
    background: rgba(20, 8, 30, 0.7);
    border: 2px solid #5a2880;
    padding: 4px 10px;
    margin-bottom: 4px;
    display: inline-block;
    letter-spacing: 1px;
  }
  #hud .stat .v { color: #ffcc44; font-weight: bold; }
  #overlay {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse at center, rgba(40, 12, 60, 0.65) 0%, rgba(8, 4, 18, 0.95) 70%);
    z-index: 10;
    backdrop-filter: blur(2px);
  }
  #overlay .panel {
    border: 4px solid #5a2880;
    background:
      linear-gradient(180deg, #2a1438 0%, #1a0a28 100%);
    padding: 24px 32px; text-align: center;
    box-shadow:
      0 0 40px rgba(180, 60, 200, 0.6),
      inset 0 0 30px rgba(80, 30, 120, 0.4);
    max-width: 760px;
    position: relative;
    max-height: 92vh;
    overflow-y: auto;
  }
  #overlay .panel::-webkit-scrollbar { width: 8px; }
  #overlay .panel::-webkit-scrollbar-thumb { background: #5a2880; }
  #overlay .panel::before {
    content: ''; position: absolute; inset: -4px;
    border: 1px solid rgba(255, 102, 204, 0.3);
    pointer-events: none;
  }
  #overlay h1 {
    margin: 0 0 12px; color: #ff66cc; letter-spacing: 6px;
    font-size: 32px;
    text-shadow: 0 0 20px rgba(255, 102, 204, 0.7), 3px 3px 0 #000;
  }
  #overlay h2 { margin: 0 0 8px; color: #ffcc44; letter-spacing: 4px;
    font-size: 20px;
    text-shadow: 0 0 15px rgba(255, 204, 68, 0.6), 2px 2px 0 #000; }
  #overlay p { margin: 8px 0; color: #c0c0d8; font-size: 13px; line-height: 1.6; }
  #overlay .controls { margin-top: 16px; font-size: 12px; color: #aaa; line-height: 1.8; }
  #overlay .controls b { color: #ff66cc; }
  /* Per-player level-up banner (team colored) */
  .lvl-banner {
    margin: -8px -16px 12px;
    padding: 12px 18px 10px;
    background:
      linear-gradient(180deg,
        color-mix(in srgb, var(--team) 28%, transparent) 0%,
        color-mix(in srgb, var(--team) 8%, transparent) 100%);
    border-top: 4px solid var(--team);
    border-bottom: 2px solid color-mix(in srgb, var(--team) 55%, transparent);
    box-shadow: 0 0 24px color-mix(in srgb, var(--team) 35%, transparent),
                inset 0 -2px 0 color-mix(in srgb, var(--team) 25%, transparent);
    position: relative;
  }
  .lvl-banner-bar {
    position: absolute; top: -4px; left: 0; right: 0; height: 4px;
    background: var(--team);
    box-shadow: 0 0 12px var(--team);
  }
  .lvl-banner-row {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 18px;
  }
  .lvl-banner-name {
    font-size: 30px; font-weight: bold;
    color: var(--team); letter-spacing: 6px;
    text-shadow: 0 0 16px color-mix(in srgb, var(--team) 70%, transparent), 3px 3px 0 #000;
  }
  .lvl-banner-team {
    font-size: 10px; letter-spacing: 4px; color: #fff;
    background: color-mix(in srgb, var(--team) 40%, #000 60%);
    border: 1px solid var(--team);
    padding: 3px 10px;
    font-weight: bold;
  }
  .lvl-banner-level {
    font-size: 14px; letter-spacing: 3px; color: #c0c0d8;
  }
  .lvl-banner-level b {
    color: #ffcc44; font-size: 18px; margin-left: 4px;
    text-shadow: 0 0 10px rgba(255, 204, 68, 0.5);
  }
  .upgrades { display: flex; gap: 20px; margin-top: 42px; justify-content: center; flex-wrap: wrap; }
  .upgrade {
    border: 3px solid #5a2880;
    background: linear-gradient(180deg, #3a1c4c 0%, #2a1438 100%);
    padding: 38px 14px 14px;
    width: 190px;
    cursor: pointer;
    transition: all 120ms ease;
    text-align: center;
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    margin-top: 28px;
  }
  .upgrade:hover {
    border-color: #ff66cc;
    background: linear-gradient(180deg, #4a2658 0%, #3a1c4c 100%);
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(255, 102, 204, 0.5);
  }
  .upgrade:hover canvas {
    box-shadow: 0 6px 18px rgba(255, 102, 204, 0.7);
    transform: translateX(-50%) translateY(-2px);
  }
  /* Icon overhangs the top of the card like a badge */
  .upgrade canvas {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    width: 56px; height: 56px;
    image-rendering: pixelated;
    background: linear-gradient(180deg, #5a2880 0%, #2a1438 100%);
    border: 3px solid #ff66cc;
    box-shadow: 0 4px 14px rgba(255, 102, 204, 0.55);
    transition: all 120ms ease;
  }
  .upgrade .name { color: #ffcc44; font-weight: bold; margin-bottom: 6px; font-size: 13px; letter-spacing: 1px; }
  .upgrade .desc { font-size: 11px; color: #ccc; line-height: 1.4; min-height: 32px; margin-bottom: 6px; }
  .upgrade .lvl { font-size: 10px; color: #66ddff; margin-top: auto; letter-spacing: 1px; padding-top: 4px; }
  .upgrade .tag {
    position: absolute; top: 6px; right: 6px;
    background: #5a2880; color: #fff; font-size: 8px;
    padding: 2px 6px; letter-spacing: 1px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  /* Super upgrade card styling */
  .upgrade.super {
    border-color: #ffcc44;
    background: linear-gradient(180deg, #4a3818 0%, #2a1c08 100%);
    box-shadow: 0 0 28px rgba(255, 204, 68, 0.45);
  }
  .upgrade.super:hover {
    border-color: #ffee88;
    box-shadow: 0 8px 30px rgba(255, 204, 68, 0.7);
  }
  .upgrade.super canvas {
    background: linear-gradient(180deg, #ffcc44 0%, #aa6600 100%);
    border-color: #ffee88;
    box-shadow: 0 4px 16px rgba(255, 204, 68, 0.7);
  }
  .upgrade.super .name { color: #ffee88; text-shadow: 0 0 10px rgba(255, 204, 68, 0.6); }
  .upgrade.super .tag { background: #ffcc44; color: #2a1c08; border-color: #ffee88; }
  /* ---- LOADOUT ---- */
  .loadout {
    margin-top: 26px; padding-top: 16px;
    border-top: 2px solid rgba(102, 221, 255, 0.25);
  }
  .loadout-title {
    font-size: 11px; letter-spacing: 3px; color: #66ddff;
    margin-bottom: 12px;
  }
  .slots-row {
    display: flex; gap: 12px; justify-content: center;
    align-items: stretch;
  }
  .slot {
    position: relative;
    width: 180px;
    border: 2px solid rgba(102, 221, 255, 0.3);
    background: rgba(15, 25, 40, 0.6);
    padding: 32px 10px 8px;
    display: flex; flex-direction: column; align-items: stretch;
  }
  .slot.filled {
    border-color: #66ddff;
    box-shadow: 0 0 14px rgba(102, 221, 255, 0.25);
    margin-top: 22px;
  }
  .slot.empty {
    border-style: dashed; opacity: 0.6;
    align-items: center; justify-content: center;
    min-height: 180px;
    padding: 10px;
    margin-top: 22px;
  }
  /* Icon overhangs the top of the slot like a badge, matching the upgrade cards. */
  .slot.filled canvas {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    width: 44px; height: 44px;
    image-rendering: pixelated;
    background: linear-gradient(180deg, #66ddff 0%, #1a66aa 100%);
    border: 3px solid #aaeeff;
    box-shadow: 0 4px 12px rgba(102, 221, 255, 0.5);
    margin: 0;
  }
  .slot.empty canvas { display: none; }
  .slot-placeholder {
    font-size: 32px; color: #555; line-height: 1; margin-bottom: 4px;
  }
  .slot .slot-name {
    font-size: 12px; color: #aaeeff; text-align: center;
    letter-spacing: 1.5px; margin-bottom: 10px; font-weight: bold;
    margin-top: 4px;
  }
  .slot.empty .slot-name { color: #666; }
  .slot-hint { font-size: 9px; color: #555; text-align: center; font-style: italic; }

  /* Evolution requirements (replaces the upgrade-max list) */
  .slot-sup-label {
    font-size: 8px; letter-spacing: 2px; color: #ffcc44;
    text-align: center; margin-bottom: 4px;
    opacity: 0.85;
  }
  .slot-sup-reqs {
    font-size: 9px; margin-bottom: 8px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .sup-req-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 3px 8px;
    background: rgba(0,0,0,0.3);
    letter-spacing: 0.5px;
    border-left: 2px solid #555;
    color: #aaa;
  }
  .sup-req-row.met {
    border-left-color: #66ff88;
    background: rgba(20, 60, 20, 0.4);
    color: #aaffaa;
  }
  .sup-req-row.done {
    border-left-color: #ffcc44;
    background: rgba(60, 44, 12, 0.5);
    color: #ffee88;
    justify-content: center;
    font-weight: bold;
    letter-spacing: 2px;
  }
  .sup-req-name { font-weight: bold; }
  .sup-req-lvl  { font-weight: bold; }

  .slot-remove {
    position: absolute; top: -8px; right: -8px;
    width: 20px; height: 20px;
    background: #aa1133; color: white;
    border: 2px solid #ff66cc; padding: 0;
    cursor: pointer; font-size: 14px; line-height: 1;
    font-weight: bold; font-family: inherit; letter-spacing: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
  .slot-remove:hover {
    background: #cc1144; transform: scale(1.15);
    box-shadow: 0 4px 14px rgba(255, 100, 100, 0.5);
  }

  .slot-super {
    margin-top: auto;
    font-size: 9px;
    padding: 6px 8px;
    border: 1px solid rgba(120, 120, 120, 0.3);
    background: rgba(20, 12, 30, 0.6);
    display: flex; align-items: center; gap: 6px;
    letter-spacing: 1px;
    cursor: help;
  }
  .slot-super .sup-icon { font-size: 12px; }
  .slot-super .sup-name { flex: 1; color: #888; font-weight: bold; }
  .slot-super .sup-count { color: #888; font-weight: bold; }
  .slot-super.ready {
    background: rgba(60, 44, 12, 0.7);
    border-color: rgba(255, 204, 68, 0.7);
    animation: superPulse 1.4s ease-in-out infinite;
  }
  .slot-super.ready .sup-icon,
  .slot-super.ready .sup-name,
  .slot-super.ready .sup-count { color: #ffcc44; }
  .slot-super.done {
    background: rgba(60, 30, 8, 0.85);
    border-color: rgba(255, 204, 68, 1);
    box-shadow: 0 0 12px rgba(255, 204, 68, 0.5);
  }
  .slot-super.done .sup-icon  { color: #ffcc44; }
  .slot-super.done .sup-name  { color: #ffee88; text-shadow: 0 0 6px rgba(255, 204, 68, 0.5); }
  .slot-super.done .sup-count { color: #ffcc44; }
  @keyframes superPulse {
    0%, 100% { box-shadow: 0 0 6px rgba(255, 204, 68, 0.3); }
    50%      { box-shadow: 0 0 14px rgba(255, 204, 68, 0.7); }
  }

  /* Unlock card styling (cyan tone) */
  .upgrade.unlock {
    border-color: #66ddff;
    background: linear-gradient(180deg, #1a3855 0%, #0a2030 100%);
    box-shadow: 0 0 22px rgba(102, 221, 255, 0.35);
  }
  .upgrade.unlock:hover { border-color: #aaeeff; box-shadow: 0 8px 28px rgba(102, 221, 255, 0.6); }
  .upgrade.unlock canvas {
    background: linear-gradient(180deg, #66ddff 0%, #1a66aa 100%);
    border-color: #aaeeff;
    box-shadow: 0 4px 14px rgba(102, 221, 255, 0.6);
  }
  .upgrade.unlock .name { color: #aaeeff; text-shadow: 0 0 10px rgba(102, 221, 255, 0.5); }
  .upgrade.unlock .tag { background: #1a66aa; color: #fff; border-color: #66ddff; }

  /* Epic upgrade card styling (purple — applies twice) */
  .upgrade.epic {
    border-color: #c050ff;
    background: linear-gradient(180deg, #3a1448 0%, #1a0828 100%);
    box-shadow: 0 0 26px rgba(192, 80, 255, 0.55);
  }
  .upgrade.epic:hover {
    border-color: #dda4ff;
    box-shadow: 0 8px 32px rgba(192, 80, 255, 0.7);
  }
  .upgrade.epic canvas {
    background: linear-gradient(180deg, #c050ff 0%, #5a2880 100%);
    border-color: #dda4ff;
    box-shadow: 0 4px 18px rgba(192, 80, 255, 0.7);
  }
  .upgrade.epic .name { color: #dda4ff; text-shadow: 0 0 12px rgba(192, 80, 255, 0.7); }
  .upgrade.epic .tag {
    background: linear-gradient(180deg, #c050ff 0%, #7a30bb 100%);
    color: #fff; border-color: #dda4ff;
    letter-spacing: 1.5px;
    animation: epicGlint 2s ease-in-out infinite;
  }
  @keyframes epicGlint {
    0%, 100% { box-shadow: 0 0 4px rgba(192, 80, 255, 0.6); }
    50%      { box-shadow: 0 0 12px rgba(220, 160, 255, 0.95); }
  }

  /* Run summary styling */
  .rs-meta {
    font-size: 12px; letter-spacing: 2px; color: #c0c0d8;
    margin: 14px 0 12px;
  }
  .rs-grid-players {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .rs-player {
    border: 2px solid #5a2880;
    background: linear-gradient(180deg, rgba(40, 18, 60, 0.6) 0%, rgba(20, 8, 30, 0.7) 100%);
    padding: 14px 16px;
    min-width: 280px;
    max-width: 340px;
    text-align: left;
  }
  .rs-name {
    font-size: 14px; letter-spacing: 3px; font-weight: bold;
    text-align: center; margin-bottom: 10px;
    text-shadow: 2px 2px 0 #000;
  }
  .rs-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px;
    font-size: 11px; margin-bottom: 10px;
  }
  .rs-grid > div {
    display: flex; justify-content: space-between;
    background: rgba(0,0,0,0.3);
    padding: 3px 8px;
    border-left: 2px solid #5a2880;
  }
  .rs-k { color: #aaa; letter-spacing: 1px; }
  .rs-v { color: #ffcc44; font-weight: bold; }
  .rs-slots {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .rs-slot {
    background: rgba(102, 221, 255, 0.18);
    border: 1px solid #66ddff;
    color: #aaeeff;
    font-size: 9px;
    padding: 3px 6px;
    letter-spacing: 1px;
  }
  .rs-dmg-title {
    font-size: 9px; letter-spacing: 2px; color: #66ddff;
    margin: 6px 0 4px;
  }
  .rs-dmg-row {
    display: grid; grid-template-columns: 90px 1fr 60px;
    align-items: center; gap: 6px;
    font-size: 10px; padding: 2px 0;
  }
  .rs-dmg-name { color: #ddd; letter-spacing: 0.5px; }
  .rs-dmg-bar {
    height: 6px; background: rgba(0,0,0,0.4);
    border-left: 2px solid #5a2880;
    position: relative; overflow: hidden;
  }
  .rs-dmg-fill {
    display: block; height: 100%;
    background: linear-gradient(to right, #ff66cc, #ffcc44);
  }
  .rs-dmg-val { color: #ffcc44; font-weight: bold; text-align: right; }
  .rs-dmg-empty { color: #666; font-style: italic; font-size: 10px; }

  /* HUD slot pips */
  #hud-slots {
    display: inline-flex; gap: 4px; margin-left: 8px; vertical-align: middle;
  }
  .hud-slot {
    display: inline-block; width: 14px; height: 14px; line-height: 14px; text-align: center;
    font-size: 10px; font-weight: bold;
    border: 1px solid #5a2880;
  }
  .hud-slot.filled { background: #66ddff; color: #0a2030; border-color: #aaeeff; }
  .hud-slot.empty  { background: rgba(20, 8, 30, 0.5); color: #555; }
  /* Mode picker buttons on start panel */
  .mode-btn {
    padding: 10px 18px; font-family: inherit; font-size: 12px;
    background: linear-gradient(180deg, #2a1438 0%, #1a0a28 100%);
    color: #c0c0d8; border: 2px solid #5a2880; cursor: pointer;
    letter-spacing: 2px; font-weight: bold;
    transition: all 100ms;
  }
  .mode-btn.selected {
    background: linear-gradient(180deg, #7a3aa0 0%, #5a2880 100%);
    border-color: #ff66cc; color: #fff;
    box-shadow: 0 0 16px rgba(255, 102, 204, 0.4);
  }
  .mode-btn:hover { transform: translateY(-1px); }
  #modeHint { font-size: 11px; line-height: 1.6; color: #aaa; }
  #modeHint b { color: #ff66cc; }

  /* P2 HUD slab (red team) */
  #hud-p2 {
    background: rgba(30, 8, 14, 0.7);
    border: 2px solid #ff6666;
    padding: 4px 10px;
    margin-top: 4px;
    letter-spacing: 1px;
    color: #ffaaaa;
  }
  #hud-p2 .p2-label { font-size: 10px; color: #ff6666; letter-spacing: 2px; margin-bottom: 2px; }
  #hud-p2 .p2-bar { width: 240px; height: 14px; margin: 2px 0 0; }

  /* ---- START PANEL ---- */
  .start-panel { max-width: 640px !important; padding: 28px 36px 24px !important; }

  .menu-title {
    font-size: 38px; letter-spacing: 8px; font-weight: bold;
    color: #ff66cc;
    text-shadow: 0 0 24px rgba(255, 102, 204, 0.7), 4px 4px 0 #000;
    margin-bottom: 4px;
  }
  .menu-subtitle {
    font-size: 11px; letter-spacing: 3px; color: #c0c0d8;
    margin-bottom: 22px;
  }
  .menu-subtitle b { color: #ffee88; letter-spacing: 4px; }

  .menu-section {
    margin: 16px 0;
    padding: 14px 16px 12px;
    border: 1px solid rgba(102, 221, 255, 0.18);
    background: rgba(15, 8, 30, 0.4);
  }
  .menu-section-title {
    font-size: 10px; letter-spacing: 5px; color: #66ddff;
    font-weight: bold;
    margin-bottom: 12px;
    text-align: left;
  }

  .mode-row {
    display: flex; gap: 14px; justify-content: center;
  }
  .mode-btn {
    padding: 10px 22px;
    font-family: inherit;
    background: linear-gradient(180deg, #2a1438 0%, #1a0a28 100%);
    color: #c0c0d8;
    border: 2px solid #5a2880;
    cursor: pointer;
    transition: all 100ms;
    min-width: 160px;
    display: flex; flex-direction: column; align-items: center;
    gap: 2px;
  }
  .mode-btn-label { font-size: 14px; letter-spacing: 3px; font-weight: bold; }
  .mode-btn-sub   { font-size: 9px;  letter-spacing: 2px; opacity: 0.6; }
  .mode-btn.selected {
    background: linear-gradient(180deg, #7a3aa0 0%, #5a2880 100%);
    border-color: #ff66cc; color: #fff;
    box-shadow: 0 0 16px rgba(255, 102, 204, 0.45);
  }
  .mode-btn.selected .mode-btn-sub { opacity: 0.9; }
  .mode-btn:hover:not(.selected) {
    border-color: #ff66cc;
    color: #fff;
  }

  /* Skin picker */
  #skinPicker { display: flex; flex-direction: column; gap: 10px; }
  .skin-row {
    display: flex; align-items: center; gap: 12px;
  }
  .skin-row-label {
    flex: 0 0 88px;
    display: flex; flex-direction: column; gap: 2px;
    text-align: left;
  }
  .skin-row-tag {
    font-size: 18px; font-weight: bold; letter-spacing: 3px;
    color: var(--team);
    text-shadow: 0 0 10px color-mix(in srgb, var(--team) 55%, transparent), 2px 2px 0 #000;
  }
  .skin-row-team {
    font-size: 8px; letter-spacing: 2px; color: #888;
  }
  .skin-options {
    flex: 1;
    display: flex; gap: 8px; justify-content: flex-start; flex-wrap: nowrap;
  }
  .skin-btn {
    flex: 1; min-width: 0;
    padding: 6px 4px 6px;
    background: linear-gradient(180deg, #1a0a28 0%, #0e0418 100%);
    border: 2px solid rgba(102, 221, 255, 0.2);
    cursor: pointer; font-family: inherit;
    transition: border-color 100ms, background 100ms;
    display: flex; flex-direction: column; align-items: center;
    gap: 4px;
  }
  .skin-preview {
    width: 100%;
    aspect-ratio: 48 / 56;
    background: rgba(0, 0, 0, 0.35);
    border: 1px solid rgba(102, 221, 255, 0.15);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .skin-btn canvas {
    display: block;
    image-rendering: pixelated;
    width: 100%; height: 100%;
  }
  .skin-btn .skin-name {
    font-size: 9px; color: #aaa; letter-spacing: 1.5px;
    font-weight: bold;
    white-space: nowrap;
  }
  .skin-btn:hover {
    border-color: var(--team);
    background: linear-gradient(180deg, #20102e 0%, #100820 100%);
  }
  .skin-btn:hover .skin-name { color: #fff; }
  .skin-btn.selected {
    border-color: var(--team);
    background: linear-gradient(180deg,
      color-mix(in srgb, var(--team) 18%, #1a0a28) 0%,
      color-mix(in srgb, var(--team) 6%, #0e0418) 100%);
    box-shadow: 0 0 12px color-mix(in srgb, var(--team) 45%, transparent);
  }
  .skin-btn.selected .skin-preview {
    border-color: var(--team);
  }
  .skin-btn.selected .skin-name {
    color: var(--team);
  }

  .menu-controls {
    display: flex; flex-wrap: wrap; gap: 8px 14px; justify-content: center;
    font-size: 10px; letter-spacing: 1px;
    color: #888;
    margin: 14px 0 4px;
  }
  .menu-controls b {
    color: #66ddff;
    background: rgba(102, 221, 255, 0.1);
    padding: 1px 5px;
    margin-right: 3px;
    border: 1px solid rgba(102, 221, 255, 0.3);
  }

  .start-button {
    display: block;
    margin: 18px auto 0;
    min-width: 220px;
    font-size: 18px !important;
  }

  .credit-tag {
    margin-top: 14px;
    font-size: 9px;
    letter-spacing: 3px;
    color: #888;
    opacity: 0.45;
    text-align: center;
    font-style: italic;
  }

  /* Super info popup */
  .slot-super { cursor: pointer; }
  .slot-super:hover { filter: brightness(1.2); }
  #supInfo {
    position: fixed; inset: 0; z-index: 20;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
  }
  #supInfo .sup-info-panel {
    position: relative;
    border: 3px solid #ffcc44;
    background: linear-gradient(180deg, #3a2a10 0%, #1a1208 100%);
    padding: 20px 28px 18px;
    min-width: 320px; max-width: 420px;
    box-shadow: 0 0 30px rgba(255, 204, 68, 0.5);
    color: #e8e8f0;
  }
  #supInfo h3 {
    margin: 0 0 6px; color: #ffee88; letter-spacing: 3px;
    font-size: 20px; text-align: center;
    text-shadow: 0 0 12px rgba(255, 204, 68, 0.6), 2px 2px 0 #000;
  }
  #supInfo .sup-info-desc {
    margin: 4px 0 14px; font-size: 12px; line-height: 1.5;
    color: #ddd; text-align: center;
  }
  #supInfo .sup-info-status {
    font-size: 10px; letter-spacing: 3px; color: #ffcc44;
    text-align: center; margin-bottom: 8px;
  }
  #supInfo .sup-info-reqs {
    display: flex; flex-direction: column; gap: 4px;
    font-size: 12px;
  }
  #supInfo .sup-req {
    display: flex; justify-content: space-between;
    padding: 6px 10px;
    background: rgba(0,0,0,0.35);
    border-left: 3px solid #555;
    letter-spacing: 1px;
  }
  #supInfo .sup-req.met {
    border-left-color: #66ff88;
    color: #aaffaa;
    background: rgba(20, 60, 20, 0.4);
  }
  #supInfo .sup-info-close {
    position: absolute; top: -10px; right: -10px;
    width: 26px; height: 26px;
    background: #aa1133; color: #fff;
    border: 2px solid #ff66cc;
    cursor: pointer; font-size: 16px; line-height: 1;
    font-weight: bold; font-family: inherit;
    padding: 0; margin: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    letter-spacing: 0;
  }
  button {
    margin-top: 18px; padding: 12px 28px; font-family: inherit; font-size: 16px;
    background: linear-gradient(180deg, #7a3aa0 0%, #5a2880 100%);
    color: white; border: 3px solid #ff66cc; cursor: pointer;
    letter-spacing: 3px; font-weight: bold;
    box-shadow: 0 4px 16px rgba(255, 102, 204, 0.4), inset 0 -3px 0 rgba(0,0,0,0.3);
    transition: all 120ms;
  }
  button:hover {
    background: linear-gradient(180deg, #8a4ab0 0%, #6a3890 100%);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 102, 204, 0.6), inset 0 -3px 0 rgba(0,0,0,0.3);
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>

<div id="hud" style="display:none">
  <div class="left">
    <div class="stat">LVL <span class="v" id="lvl">1</span> &nbsp; <span id="time">00:00</span> <span id="hud-slots"></span></div>
    <div class="bar xp"><div id="xpbar" style="width:0%"></div><div class="label" id="xplbl">0 / 5</div></div>
  </div>
  <div class="right">
    <div class="stat">KILLS <span class="v" id="kills">0</span></div>
    <div id="hud-p2" style="display:none; min-width: 280px;"></div>
  </div>
</div>

<div id="overlay">
  <div class="panel" id="panel">
    <h1>PIXEL SURVIVORS</h1>
    <div class="controls" id="modeControls">
      <div style="margin-bottom: 10px; color:#66ddff; letter-spacing:2px;">CHOOSE MODE</div>
      <div id="modeButtons" style="display:flex; gap:14px; justify-content:center; margin: 12px 0 14px;">
        <button class="mode-btn selected" data-mode="solo">SOLO</button>
        <button class="mode-btn" data-mode="coop">CO-OP (2P)</button>
      </div>
      <div id="modeHint">
        <b>P1</b>: WASD or <b>Click</b> to move &nbsp; • &nbsp; <b>P2</b>: Arrows &nbsp; • &nbsp; <b>SPACE</b> to pause &nbsp; • &nbsp; <b>M</b> to mute
      </div>
      <div style="margin-top: 8px; color:#ffcc44; font-size: 11px; letter-spacing: 2px;">
        SURVIVE 15 MINUTES &nbsp;→&nbsp; <b style="color:#ffee88">DEFEAT THE TITAN</b>
      </div>
    </div>
    <div id="skinPicker"></div>
    <button id="startBtn">START</button>
  </div>
</div>

<script src="sprites.js"></script>
<script src="sfx.js"></script>
<script src="data.js"></script>
<script src="entities.js"></script>
<script src="weapons.js"></script>
<script src="ui.js"></script>
<script src="game.js"></script>
</body>
</html>
